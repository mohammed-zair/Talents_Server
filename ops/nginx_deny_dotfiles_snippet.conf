# Include this inside each relevant server block.

# Block direct access to dotfiles (.env, .git, etc.)
location ~ /\.(?!well-known).* {
    deny all;
    return 404;
}

# Explicitly block common sensitive paths
location = /api/.env { deny all; return 404; }
location = /.env { deny all; return 404; }
location ~ /\.git { deny all; return 404; }
